# ══════════════════════════════════════════════════════════
#  画风提取器 - Docker Compose 编排
#  使用方式:
#    1. 复制 backend/.env.production 为项目根目录的 .env
#       (或直接: cp backend/.env.production .env)
#    2. docker compose up -d --build
# ══════════════════════════════════════════════════════════

services:

  # ━━━ MySQL 8 数据库 ━━━
  mysql:
    image: mysql:8.0
    container_name: turing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-turing123}
      MYSQL_DATABASE: ${DB_NAME:-turing_drawing}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-turing123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ━━━ Spring Boot 后端 ━━━
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.optimized
    container_name: turing-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - backend/.env.production
    environment:
      # 覆盖：Docker 内部 MySQL 连接（覆盖 .env 中的 localhost）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-turing_drawing}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-turing123}
      # 运行环境（确保 prod 模式）
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ━━━ Nginx 前端 + 反向代理 ━━━
  nginx:
    image: nginx:alpine
    container_name: turing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 已备案域名用 nginx.conf，未备案/IP直联用 nginx-no-domain.conf
      - ${NGINX_CONF:-./deploy/nginx-no-domain.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/build/h5:/var/www/turing-drawing/dist:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data:
