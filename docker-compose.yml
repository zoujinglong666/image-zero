# 图灵绘境 Docker Compose - Spring Boot版本
# 使用方式: docker compose up -d
# 必须先创建 .env 文件（参考 .env.example 填写密钥）

version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: turing-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-turing123}
      - MYSQL_DATABASE=turing_drawing
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    # ⚠️ 安全：不对外暴露3306端口，仅Docker内网可访问
    # 如需本地调试可改为 "127.0.0.1:3306:3306"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turing-drawing-backend
    restart: unless-stopped
    # ⚠️ 安全：仅绑定本机，通过nginx反代访问
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=turing_drawing
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-turing123}
      - JWT_SECRET=${JWT_SECRET}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - COS_BUCKET=${COS_BUCKET}
      - COS_DOMAIN=${COS_DOMAIN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://www.image-zero.art,https://image-zero.art}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx 前端 + 反向代理
  nginx:
    image: nginx:alpine
    container_name: turing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 未备案用 nginx-no-domain.conf，备案后用 nginx.conf
      - ${NGINX_CONF:-./deploy/nginx-no-domain.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/build/h5:/var/www/turing-paint/dist:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data: