server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: turing-drawing
  config:
    import: optional:dotenv[.env]

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:turing_drawing}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-please-change-in-production-min-32-chars}
  expiration: 7200000
  refresh-expiration: 604800000

# Tencent Cloud COS
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET:}
  domain: ${COS_DOMAIN:}
  upload-dir: ${COS_UPLOAD_DIR:./uploads}

# OpenAI Configuration (OpenRouter 兼容)
openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

# 智谱 AI Configuration（GLM-4.6V-Flash 免费视觉模型 + GLM-Image 生图）
zhipu:
  api-key: ${ZHIPU_API_KEY:}
  generate-model: ${ZHIPU_GENERATE_MODEL:glm-image}
  enable-ad-gate: ${ZHIPU_ENABLE_AD_GATE:true}
  daily-free-limit: ${ZHIPU_DAILY_FREE_LIMIT:3}
  cost-per-gen: ${ZHIPU_COST_PER_GEN:0.1}

# 小米 MiMo Configuration（多模态视觉模型，OpenAI兼容格式）
mimo:
  api-key: ${MIMO_API_KEY:}
  base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1}
  analyze-model: ${MIMO_ANALYZE_MODEL:mimo-v2.5}

# 硅基流动 Configuration（Qwen2-VL 免费视觉模型，并发限制更宽松）
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
  analyze-model: ${SILICONFLOW_ANALYZE_MODEL:Qwen/Qwen2-VL-7B-Instruct}

# AI 模型配置（智谱 AI GLM-4.6V-Flash 免费视觉模型）
ai:
  analyze-model: ${AI_ANALYZE_MODEL:glm-4.6v-flash}
  generate-model: ${AI_GENERATE_MODEL:dall-e-3}

# Google Gemini Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}

# WeChat Configuration
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  mini-program-app-id: ${WECHAT_MINI_PROGRAM_APP_ID:}
  mini-program-app-secret: ${WECHAT_MINI_PROGRAM_APP_SECRET:}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# Rate Limiter
rate-limiter:
  ai-per-minute: ${RATE_LIMIT_AI:10}
  auth-per-minute: ${RATE_LIMIT_AUTH:20}
  community-per-minute: ${RATE_LIMIT_COMMUNITY:60}
  upload-per-minute: ${RATE_LIMIT_UPLOAD:15}
  window-seconds: 60

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    diskspace:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.turing.drawing: DEBUG
    com.turing.drawing.mapper: DEBUG