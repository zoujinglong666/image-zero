# 图灵绘境 - Spring Boot 测试环境配置
# 生成时间: 2026-05-19 10:30:00

# ======================
# 服务器配置
# ======================
server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: ${APP_CONTEXT_PATH:/}

# ======================
# 数据源配置
# ======================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:turing_drawing}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # ======================
  # JPA/Hibernate配置
  # ======================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  # ======================
  # 文件上传配置
  # ======================
  servlet:
    multipart:
      max-file-size: ${FILE_UPLOAD_MAX_SIZE:50MB}
      max-request-size: ${FILE_UPLOAD_MAX_SIZE:50MB}

  # ======================
  # 邮件配置
  # ======================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ======================
# JWT配置
# ======================
jwt:
  secret: ${JWT_SECRET:test_jwt_secret_change_in_production}
  expiration: ${JWT_EXPIRATION:86400000}

# ======================
# 腾讯云COS配置
# ======================
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET:}

# ======================
# AI服务配置
# ======================
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4
    max-tokens: 2000
    temperature: 0.7
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-pro
    max-tokens: 2000
    temperature: 0.7

# ======================
# 微信配置
# ======================
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}

# ======================
# CORS配置
# ======================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://test.your-domain.com}

# ======================
# 日志配置
# ======================
logging:
  level:
    root: INFO
    com.turingdrawing: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:/app/logs}/app.log

# ======================
# Actuator配置
# ======================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ======================
# 自定义配置
# ======================
app:
  name: 图灵绘境
  version: 2.0.0
  environment: test