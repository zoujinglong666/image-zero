# 图灵绘境 Nginx 反向代理配置 — 未备案/IP直连版本
# 适用场景：腾讯云轻量服务器，域名未备案，仅用IP访问
# 使用方式：替换 nginx.conf 或在 docker-compose 中指定此文件
#
# 注意事项：
# - 未备案域名无法使用微信H5网页授权（需要80/443+备案域名）
# - 未备案域名无法使用Let's Encrypt SSL证书
# - 建议先用IP地址跑HTTP，备案后再切换到 nginx.conf + HTTPS

# Gzip 压缩（全局）
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/json
  application/javascript
  application/x-javascript
  application/xml
  application/xml+rss
  application/vnd.ms-fontobject
  application/x-font-ttf
  font/opentype
  image/svg+xml
  image/x-icon;

# HTTP 主配置（无HTTPS，IP直连）
server {
    listen 80;
    # 填写你的服务器IP或临时域名
    server_name _;

    # 安全响应头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 请求体大小限制（图片上传）
    client_max_body_size 15m;

    # 限流区域（按 IP 限制）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 前端静态资源
    location / {
        root /var/www/turing-drawing/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 反向代理
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 分析可能耗时较长）
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查（不限流）
    location /health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}