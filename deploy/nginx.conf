# 图灵绘境 Nginx 反向代理配置
# 域名: www.image-zero.art

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name image-zero.art www.image-zero.art;
    return 301 https://www.image-zero.art$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name www.image-zero.art;

    # SSL 证书（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/www.image-zero.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.image-zero.art/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 请求体大小限制（图片上传）
    client_max_body_size 15m;

    # 限流区域（按 IP 限制）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 前端静态资源
    location / {
        root /var/www/turing-paint/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 反向代理
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 分析可能耗时较长）
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查（不限流）
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}